# 选择 docker-compose 版本
version: "3.8"

services:
  # PostgreSQL 16
  postgres:
    image: postgres:16-alpine
    container_name: magicstream-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: magicstream
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: magicstream
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U magicstream"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: magicstream-redis
    restart: unless-stopped
    # --appendonly yes 开启 AOF（Append Only File）持久化。
    # 开发环境也建议开启，因为 Redis 重启后数据才不会丢失。
    # 但如果你希望每次重启都是干净状态，可以删除此配置。
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
